<!DOCTYPE html>

<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@100;300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#4F46E5",
                        "background-light": "#FAFAF9",
                        "background-dark": "#0F172A",
                        "navy-900": "#0F172A",
                        "stone-900": "#1C1917",
                        "stone-500": "#78716C",
                        "stone-300": "#D6D3D1",
                        "stone-200": "#E7E5E4",
                        "cream": "#F5F5F4"
                    },
                    fontFamily: {
                        "display": ["Be Vietnam Pro", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Be Vietnam Pro', sans-serif;
        }
        .glass-effect {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-stone-900 font-display">
<main class="flex min-h-screen w-full overflow-hidden">
<!-- LEFT PANEL -->
<section class="w-full lg:w-1/2 flex flex-col items-center justify-center p-8 bg-background-light">
<div class="w-full max-w-[400px] flex flex-col gap-8">
<!-- Logo -->
<div class="flex items-center gap-2 mb-4">
<span class="material-symbols-outlined text-primary text-3xl">deployed_code</span>
<h1 class="text-navy-900 text-xl font-extrabold tracking-tighter">JULES STUDIO</h1>
</div>
<!-- Header Text -->
<div class="flex flex-col gap-2">
<h2 class="text-stone-900 text-3xl font-extrabold tracking-tight">Đăng Nhập</h2>
<p class="text-stone-500 text-base">Truy cập tài khoản để theo dõi dự án của bạn</p>
</div>
<!-- Form -->
<form class="flex flex-col gap-5" onsubmit="return false;">
<div class="flex flex-col gap-1.5">
<label class="text-stone-900 text-sm font-semibold">Email</label>
<input class="w-full px-4 py-3 rounded-lg border border-stone-200 bg-white text-stone-900 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all placeholder:text-stone-400" placeholder="example@email.com" type="email"/>
</div>
<div class="flex flex-col gap-1.5">
<div class="flex justify-between items-center">
<label class="text-stone-900 text-sm font-semibold">Mật khẩu</label>
<a class="text-primary text-sm font-medium hover:underline" href="#">Quên mật khẩu?</a>
</div>
<input class="w-full px-4 py-3 rounded-lg border border-stone-200 bg-white text-stone-900 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all placeholder:text-stone-400" placeholder="••••••••" type="password"/>
</div>
<button class="w-full bg-primary text-white font-bold py-3.5 rounded-lg hover:bg-opacity-90 transition-all shadow-lg shadow-primary/20" type="submit">
                        Đăng Nhập
                    </button>
</form>
<!-- Divider -->
<div class="relative flex items-center py-2">
<div class="flex-grow border-t border-stone-300"></div>
<span class="flex-shrink mx-4 text-stone-400 text-sm">hoặc</span>
<div class="flex-grow border-t border-stone-300"></div>
</div>
<!-- Google Login -->
<button class="w-full flex items-center justify-center gap-3 px-4 py-3 border border-stone-200 rounded-lg bg-white hover:bg-stone-50 transition-all">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span class="text-stone-900 font-semibold text-sm">Đăng nhập với Google</span>
</button>
<!-- Footer -->
<p class="text-center text-stone-500 text-sm">
                    Chưa có tài khoản? <a class="text-primary font-bold hover:underline" href="#">Đăng ký</a>
</p>
</div>
</section>
<!-- RIGHT PANEL -->
<section class="hidden lg:flex w-1/2 relative bg-navy-900 items-center justify-center p-12 overflow-hidden">
<!-- Subtle Glow Background -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-primary/20 blur-[120px] rounded-full"></div>
<div class="absolute bottom-0 right-0 w-[400px] h-[400px] bg-indigo-500/10 blur-[100px] rounded-full"></div>
<div class="relative z-10 flex flex-col items-center max-w-[640px] w-full gap-12">
<!-- Mockup Showcase -->
<div class="relative w-full aspect-video flex items-end justify-center">
<!-- Desktop Screen -->
<div class="relative w-[85%] aspect-[16/10] bg-navy-900 rounded-xl border-[6px] border-[#334155] shadow-2xl overflow-hidden z-20">
<img alt="Luxury resort website mockup with elegant design" class="w-full h-full object-cover opacity-90" data-alt="Luxury resort website landing page on a desktop screen" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDPCQGRk7GPZzK7YoSS3Jr1DkoB3AaFV6-HXn2vIW3YDggX7rcMckMbsT1ywAwZHttzsu5KtTUxkp2I25Lky30916-5PbI4M9lMHQetHDMMnf6Cgv0Fk8GngMu6nmvZooqLk1DcjGgvXx1EahNqDnaZDkf--tlwDd8KWbFwIT7198Yp4-Otmy6DGH3cLWaqGlgZO6_gJQMgcubPsLIMbTUezwVmvfJZaBvTjbpFOAgInqm3HZbZa_BYg5JJDy4V24bUmJ1V5gtI-jI"/>

</div>
<!-- Tablet Screen -->
<div class="absolute -left-4 bottom-[-10px] w-[35%] aspect-[3/4] bg-navy-900 rounded-lg border-[4px] border-[#334155] shadow-2xl overflow-hidden z-30">
<img alt="Resort amenities view on a tablet device" class="w-full h-full object-cover" data-alt="Luxury resort hotel room gallery on tablet screen" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBpqscFPcM3-q0cciWM8q9z3MH0aNlbL2UaP5QTu9DfjsP1FdvResdKQLTI-Sl6qa_MHyAo8CvXk8jAczsuyl0rRs7esxfjqPfwlNg7grXJUpPjmeEfkdN4Yho5VhsLZPFnbrpE2SJhU9QsqJsdPP18oHEHqhw1uXz5VgBVONb2eiXSayd5vNwXO3a9VyXmeVH44NeS1PvFkzWumUtqnmjzLnuVkrrb3QkU2iQCWudXxW0btZtIze7oQut2qh1lw5gHXTsgAKt5eJM"/>
</div>
<!-- Smartphone Screen -->
<div class="absolute -right-6 bottom-4 w-[18%] aspect-[9/19.5] bg-navy-900 rounded-2xl border-[4px] border-[#334155] shadow-2xl overflow-hidden z-40">
<img alt="Mobile booking interface for resort website" class="w-full h-full object-cover" data-alt="Resort mobile app booking interface on smartphone screen" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCmnlhwwD6qTOq3KHTON8CkhmQWT_faFAUj_fSA9kAEJ4jeoDAlI50akYOLeADHIx4OKjWN8GB0vRwMfNtdFeHoKOf-Fv2GI-34-RLVt7Ejpq-5QFyEqE_TU82BcfUSzJ01EM-plT76QJZrrXXD_ZDefNQZL6KCokqQ0lnIVDpcHc9gI72DRJuy9v0UkRNjtUsBG782IsYvKIWW7tIw2fnzCv1iONw9mWYjaE66wGbI21X-UtLUYUz2g33goVzCqASYqbb0iApK3qQ"/>
</div>
</div>
<!-- Text Content -->
<div class="flex flex-col gap-6 text-center lg:text-left w-full">
<h3 class="text-cream text-4xl font-bold tracking-tight">Theo dõi dự án realtime</h3>
<ul class="flex flex-col gap-4">
<li class="flex items-center gap-3 text-cream/70 text-lg">
<span class="material-symbols-outlined text-primary bg-primary/10 p-1 rounded-full text-sm">check</span>
                            Xem tiến độ dự án
                        </li>
<li class="flex items-center gap-3 text-cream/70 text-lg">
<span class="material-symbols-outlined text-primary bg-primary/10 p-1 rounded-full text-sm">check</span>
                            Tải hợp đồng &amp; tài liệu
                        </li>
<li class="flex items-center gap-3 text-cream/70 text-lg">
<span class="material-symbols-outlined text-primary bg-primary/10 p-1 rounded-full text-sm">check</span>
                            Quản lý thanh toán
                        </li>
</ul>
</div>
</div>
</section>
</main>
</body></html>
