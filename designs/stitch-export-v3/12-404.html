<!DOCTYPE html>

<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>404 - Không Tìm Thấy Trang | Jules Studio</title>
<!-- BEGIN: Fonts & Tailwind CDN -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;700;900&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- END: Fonts & Tailwind CDN -->
<!-- BEGIN: Tailwind Configuration -->
<script data-purpose="tailwind-config">
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Be Vietnam Pro"', 'sans-serif'],
          },
          colors: {
            warmWhite: '#FAFAF9',
          }
        }
      }
    }
  </script>
<!-- END: Tailwind Configuration -->
<style data-purpose="layout-styles">
    body {
      background-color: #FAFAF9;
      -webkit-font-smoothing: antialiased;
    }
    .watermark-text {
      line-height: 1;
      pointer-events: none;
      user-select: none;
    }
  </style>
</head>
<body class="min-h-screen flex flex-col font-sans text-stone-900">
<!-- BEGIN: MainHeader -->
<header class="fixed top-0 left-0 w-full bg-white/80 backdrop-blur-md border-b border-stone-100 z-50">
<nav class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between" data-purpose="navigation-bar">
<!-- Logo -->
<a class="text-xl font-black tracking-tighter flex items-center gap-1" href="/">
<span class="text-indigo-600">JULES</span>
<span class="text-stone-900">STUDIO</span>
</a>
<!-- Navigation Links -->
<div class="hidden md:flex items-center gap-10">
<ul class="flex items-center gap-8 text-sm font-medium text-stone-600">
<li><a class="hover:text-indigo-600 transition-colors" href="#">Dự Án</a></li>
<li><a class="hover:text-indigo-600 transition-colors" href="#">Dịch Vụ</a></li>
<li><a class="hover:text-indigo-600 transition-colors" href="#">Báo Giá</a></li>
</ul>
<a class="bg-indigo-600 text-white px-5 py-2.5 rounded-lg text-sm font-semibold hover:bg-indigo-700 transition-all shadow-sm shadow-indigo-200" href="#">
          Bắt Đầu Dự Án
        </a>
</div>
<!-- Mobile Menu Toggle (Visual only) -->
<button class="md:hidden p-2 text-stone-900">
<svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="1.5" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
</button>
</nav>
</header>
<!-- END: MainHeader -->
<!-- BEGIN: MainContent -->
<main class="flex-grow flex items-center justify-center relative px-6 overflow-hidden">
<!-- Watermark 404 Background -->
<div class="absolute inset-0 flex items-center justify-center -z-10">
<span class="watermark-text text-[12rem] md:text-[20rem] font-black text-stone-100/80 tracking-tighter">404</span>
</div>
<!-- Error Messaging -->
<div class="text-center flex flex-col items-center max-w-lg z-10" data-purpose="404-message-container">
<h1 class="text-3xl md:text-4xl font-bold text-stone-900 mb-4">
        Trang không tìm thấy
      </h1>
<p class="text-stone-500 mb-10 text-base md:text-lg leading-relaxed max-w-[400px]">
        Trang bạn tìm kiếm không tồn tại hoặc đã được di chuyển.
      </p>
<!-- CTA Button -->
<a class="group flex items-center gap-2 bg-indigo-600 text-white px-10 py-4 rounded-xl font-semibold text-base hover:bg-indigo-700 hover:shadow-xl hover:shadow-indigo-200/50 transition-all duration-300" href="/">
<svg class="w-5 h-5 group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor" stroke-width="2" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
<span>Về Trang Chủ</span>
</a>
</div>
</main>
<!-- END: MainContent -->
<!-- BEGIN: MainFooter -->
<footer class="py-10 border-t border-stone-100">
<div class="max-w-7xl mx-auto px-6 text-center">
<p class="text-stone-400 text-sm font-medium tracking-wide">
        © 2026 Jules Studio
      </p>
</div>
</footer>
<!-- END: MainFooter -->
</body></html>
