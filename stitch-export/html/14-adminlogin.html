<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Jules Studio - Login</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&amp;family=Syne:wght@800&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#6464f2",
                        "background-light": "#ffffff",
                        "background-dark": "#101022",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"],
                        "heading": ["Syne", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0rem", "lg": "0rem", "xl": "0rem", "full": "0rem" },
                },
            },
        }
    </script>
</head>

<body
    class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col antialiased selection:bg-primary selection:text-white">
    <div class="flex-1 flex flex-col justify-center items-center px-4 sm:px-6 lg:px-8 py-12">
        <div class="w-full max-w-md flex flex-col items-center">
            <!-- Logo/Header Area -->
            <div class="flex items-center gap-3 mb-16">
                <div class="size-8 text-black dark:text-white">
                    <svg class="w-full h-full" fill="none" viewbox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
                        <path clip-rule="evenodd"
                            d="M39.475 21.6262C40.358 21.4363 40.6863 21.5589 40.7581 21.5934C40.7876 21.655 40.8547 21.857 40.8082 22.3336C40.7408 23.0255 40.4502 24.0046 39.8572 25.2301C38.6799 27.6631 36.5085 30.6631 33.5858 33.5858C30.6631 36.5085 27.6632 38.6799 25.2301 39.8572C24.0046 40.4502 23.0255 40.7407 22.3336 40.8082C21.8571 40.8547 21.6551 40.7875 21.5934 40.7581C21.5589 40.6863 21.4363 40.358 21.6262 39.475C21.8562 38.4054 22.4689 36.9657 23.5038 35.2817C24.7575 33.2417 26.5497 30.9744 28.7621 28.762C30.9744 26.5497 33.2417 24.7574 35.2817 23.5037C36.9657 22.4689 38.4054 21.8562 39.475 21.6262ZM4.41189 29.2403L18.7597 43.5881C19.8813 44.7097 21.4027 44.9179 22.7217 44.7893C24.0585 44.659 25.5148 44.1631 26.9723 43.4579C29.9052 42.0387 33.2618 39.5667 36.4142 36.4142C39.5667 33.2618 42.0387 29.9052 43.4579 26.9723C44.1631 25.5148 44.659 24.0585 44.7893 22.7217C44.9179 21.4027 44.7097 19.8813 43.5881 18.7597L29.2403 4.41187C27.8527 3.02428 25.8765 3.02573 24.2861 3.36776C22.6081 3.72863 20.7334 4.58419 18.8396 5.74801C16.4978 7.18716 13.9881 9.18353 11.5858 11.5858C9.18354 13.988 7.18717 16.4978 5.74802 18.8396C4.58421 20.7334 3.72865 22.6081 3.36778 24.2861C3.02574 25.8765 3.02429 27.8527 4.41189 29.2403Z"
                            fill="currentColor" fill-rule="evenodd"></path>
                    </svg>
                </div>
                <span class="text-xl font-heading tracking-tight text-black dark:text-white uppercase">Jules
                    Studio</span>
            </div>
            <!-- Headings -->
            <div class="text-center w-full mb-12">
                <h1
                    class="text-6xl sm:text-7xl font-heading font-extrabold text-black dark:text-white mb-4 tracking-tighter uppercase">
                    LOG IN</h1>
                <p class="text-base sm:text-lg text-slate-600 dark:text-slate-400">Access your project dashboard.</p>
            </div>
            <!-- Form -->
            <form class="w-full space-y-6">
                <!-- Email Input -->
                <div>
                    <label class="block text-sm font-bold text-black dark:text-white mb-2 uppercase tracking-wider"
                        for="email">Email</label>
                    <input
                        class="w-full border border-black dark:border-white bg-transparent text-black dark:text-white px-4 py-4 focus:outline-none focus:ring-0 focus:border-black dark:focus:border-white placeholder:text-slate-400 dark:placeholder:text-slate-500 rounded-none transition-colors"
                        id="email" name="email" placeholder="your@email.com" required="" type="email" />
                </div>
                <!-- Password Input -->
                <div>
                    <label class="block text-sm font-bold text-black dark:text-white mb-2 uppercase tracking-wider"
                        for="password">Password</label>
                    <input
                        class="w-full border border-black dark:border-white bg-transparent text-black dark:text-white px-4 py-4 focus:outline-none focus:ring-0 focus:border-black dark:focus:border-white placeholder:text-slate-400 dark:placeholder:text-slate-500 rounded-none transition-colors"
                        id="password" name="password" placeholder="••••••••" required="" type="password" />
                </div>
                <!-- Forgot Password Link -->
                <div class="flex justify-end pt-2">
                    <a class="text-sm font-medium text-primary hover:text-primary/80 transition-colors" href="#">Forgot
                        Password?</a>
                </div>
                <!-- Submit Button -->
                <div class="pt-6">
                    <button
                        class="w-full bg-black dark:bg-white text-white dark:text-black font-bold uppercase tracking-widest py-5 px-4 hover:bg-slate-900 dark:hover:bg-slate-100 transition-colors rounded-none"
                        type="submit">
                        Sign In
                    </button>
                </div>
            </form>
        </div>
    </div>
</body>

</html>
